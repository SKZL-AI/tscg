<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TSCG Prompt Optimizer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup-container">
    <!-- Header -->
    <header class="header">
      <div class="header-left">
        <div class="logo">T</div>
        <div class="header-text">
          <h1>TSCG Prompt Optimizer</h1>
          <span class="version">v5.0.0</span>
        </div>
      </div>
      <a href="options.html" target="_blank" class="settings-btn" title="Settings">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M6.5 1L7.1 3.1C7.5 3.2 7.9 3.4 8.2 3.6L10.2 2.8L11.7 5.4L10 6.7C10 7.1 10 7.5 9.9 7.9L11.7 9.1L10.2 11.7L8.2 10.9C7.9 11.1 7.5 11.3 7.1 11.4L6.5 13.5H3.5L2.9 11.4C2.5 11.3 2.1 11.1 1.8 10.9L-0.2 11.7L-1.7 9.1L0.1 7.9C0 7.5 0 7.1 0 6.7L-1.7 5.4L-0.2 2.8L1.8 3.6C2.1 3.4 2.5 3.2 2.9 3.1L3.5 1H6.5Z" transform="translate(3, 0.5)" stroke="currentColor" stroke-width="1.2" fill="none"/>
          <circle cx="8" cy="7.75" r="2" stroke="currentColor" stroke-width="1.2" fill="none"/>
        </svg>
      </a>
    </header>

    <!-- Savings Badge (v5.0) -->
    <section class="savings-badge" id="savings-badge">
      <div class="savings-badge-row">
        <div class="savings-stat">
          <span class="savings-value" id="savings-total-tokens">--</span>
          <span class="savings-label">tokens saved</span>
        </div>
        <div class="savings-divider"></div>
        <div class="savings-stat">
          <span class="savings-value" id="savings-opt-count">--</span>
          <span class="savings-label">optimizations</span>
        </div>
        <div class="savings-divider"></div>
        <div class="savings-stat">
          <span class="savings-value savings-schema" id="savings-schemas">--</span>
          <span class="savings-label">tools detected</span>
        </div>
      </div>
      <div class="savings-potential hidden" id="savings-potential">
        <span class="savings-potential-text" id="savings-potential-text"></span>
      </div>
    </section>

    <!-- Input Section -->
    <section class="input-section">
      <label for="input-prompt" class="section-label">Input Prompt</label>
      <textarea id="input-prompt" placeholder="Paste your prompt here..." rows="5"></textarea>
    </section>

    <!-- Controls -->
    <section class="controls">
      <div class="control-row">
        <div class="control-group">
          <label for="profile-select">Profile</label>
          <select id="profile-select">
            <option value="minimal">Minimal</option>
            <option value="balanced" selected>Balanced</option>
            <option value="max_compress">Max Compress</option>
            <option value="max_accuracy">Max Accuracy</option>
            <option value="full">Full</option>
          </select>
        </div>
        <div class="toggle-group">
          <label class="toggle-label">
            <input type="checkbox" id="toggle-ccp" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-text">CCP</span>
          </label>
          <label class="toggle-label">
            <input type="checkbox" id="toggle-sadf" checked>
            <span class="toggle-track"><span class="toggle-thumb"></span></span>
            <span class="toggle-text">SAD-F</span>
          </label>
        </div>
      </div>
      <button id="optimize-btn" class="optimize-btn">
        <span class="btn-text">Optimize</span>
        <span class="btn-spinner hidden"></span>
      </button>
    </section>

    <!-- Output Section -->
    <section class="output-section hidden" id="output-section">
      <label class="section-label">
        Optimized Output
        <button id="copy-btn" class="copy-btn" title="Copy to clipboard">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
            <rect x="4" y="4" width="9" height="9" rx="1.5" stroke="currentColor" stroke-width="1.3"/>
            <path d="M10 4V2.5C10 1.67 9.33 1 8.5 1H2.5C1.67 1 1 1.67 1 2.5V8.5C1 9.33 1.67 10 2.5 10H4" stroke="currentColor" stroke-width="1.3"/>
          </svg>
          <span id="copy-text">Copy</span>
        </button>
      </label>
      <textarea id="output-prompt" readonly rows="5"></textarea>
    </section>

    <!-- Metrics Bar -->
    <section class="metrics-bar hidden" id="metrics-bar">
      <div class="metric">
        <span class="metric-value" id="metric-tokens">--</span>
        <span class="metric-label">tokens saved</span>
      </div>
      <div class="metric-divider"></div>
      <div class="metric">
        <span class="metric-value" id="metric-compression">--</span>
        <span class="metric-label">compression</span>
      </div>
      <div class="metric-divider"></div>
      <div class="metric">
        <span class="metric-value" id="metric-type">--</span>
        <span class="metric-label">prompt type</span>
      </div>
      <div class="metric-divider"></div>
      <div class="metric">
        <span class="metric-value" id="metric-transforms">--</span>
        <span class="metric-label">transforms</span>
      </div>
    </section>

    <!-- Pipeline Details (collapsible) -->
    <details class="pipeline-details hidden" id="pipeline-details">
      <summary>Transform Pipeline</summary>
      <div id="pipeline-list" class="pipeline-list"></div>
    </details>
  </div>

  <script src="tscg-optimizer.js"></script>
  <script src="popup.js"></script>
</body>
</html>
